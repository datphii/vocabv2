<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Clip the whole icon to a rounded square -->
    <clipPath id="rounded-bg">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#2563eb"/>

  <!-- ══════════════════════════════════════════
       GEAR: built from a filled circle (body)
       + 12 tooth rectangles rotated around center
       + a white hole punched out via a circle
       All pieces are white; hole is blue.
       cx=256, cy=256
       Body circle r=145
       Tooth rect: 36w × 80h, top edge at y=256-145=111, so rect y from 256-185=-185+256=71 to 256-145=111
       i.e. rect centered at x=256, top=71, height=74 (from r=145 to r=182+buffer)
       ══════════════════════════════════════════ -->
  <g clip-path="url(#rounded-bg)">

    <!-- Gear body (circle) -->
    <circle cx="256" cy="256" r="148" fill="white"/>

    <!-- 12 teeth: rectangles rotated every 30° -->
    <rect x="238" y="70"  width="36" height="82" rx="4" fill="white" transform="rotate(  0 256 256)"/>
    <rect x="238" y="70"  width="36" height="82" rx="4" fill="white" transform="rotate( 30 256 256)"/>
    <rect x="238" y="70"  width="36" height="82" rx="4" fill="white" transform="rotate( 60 256 256)"/>
    <rect x="238" y="70"  width="36" height="82" rx="4" fill="white" transform="rotate( 90 256 256)"/>
    <rect x="238" y="70"  width="36" height="82" rx="4" fill="white" transform="rotate(120 256 256)"/>
    <rect x="238" y="70"  width="36" height="82" rx="4" fill="white" transform="rotate(150 256 256)"/>
    <rect x="238" y="70"  width="36" height="82" rx="4" fill="white" transform="rotate(180 256 256)"/>
    <rect x="238" y="70"  width="36" height="82" rx="4" fill="white" transform="rotate(210 256 256)"/>
    <rect x="238" y="70"  width="36" height="82" rx="4" fill="white" transform="rotate(240 256 256)"/>
    <rect x="238" y="70"  width="36" height="82" rx="4" fill="white" transform="rotate(270 256 256)"/>
    <rect x="238" y="70"  width="36" height="82" rx="4" fill="white" transform="rotate(300 256 256)"/>
    <rect x="238" y="70"  width="36" height="82" rx="4" fill="white" transform="rotate(330 256 256)"/>

    <!-- Hub hole punched in blue -->
    <circle cx="256" cy="256" r="66" fill="#2563eb"/>

    <!-- M letter in white, centered -->
    <text
      x="256"
      y="305"
      font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
      font-size="190"
      font-weight="900"
      fill="white"
      text-anchor="middle"
      dominant-baseline="auto"
    >M</text>

  </g>
</svg>
